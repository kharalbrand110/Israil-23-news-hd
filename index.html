<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KHARAL-MD - Video & Audio Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .top-bar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff6b6b;
        }
        
        .brand-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .whatsapp-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            padding: 8px 14px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }
        
        .main-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .subtitle {
            text-align: center;
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 24px;
        }
        
        .platform-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .platform-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .platform-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-color: transparent;
        }
        
        .url-input-wrapper {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
        }
        
        .url-input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            outline: none;
        }
        
        .fetch-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 60px;
            padding: 0 24px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .fetch-btn:disabled {
            opacity: 0.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-box {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .video-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        
        .video-title {
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            word-break: break-word;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .quality-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .quality-option {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        
        .quality-option:active {
            transform: scale(0.98);
        }
        
        .quality-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quality-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .quality-size {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .download-item-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .error-msg, .success-msg {
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        
        .error-msg { background: rgba(255, 68, 68, 0.9); }
        .success-msg { background: rgba(37, 211, 102, 0.9); }
        
        .powered {
            text-align: center;
            font-size: 11px;
            margin-top: 20px;
            opacity: 0.5;
        }
        
        .bottom-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 10px;
            text-align: center;
            font-size: 11px;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .fetch-btn { padding: 0 18px; font-size: 14px; }
            .url-input { padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-area">
            <img src="https://i.postimg.cc/NfJxTRWy/1775276938074-1.jpg" class="logo-img" onerror="this.src='https://via.placeholder.com/42'">
            <span class="brand-text">KHARAL-MD</span>
        </div>
        <a href="https://wa.me/923292359957" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
    </div>

    <div class="main-card">
        <h1>📥 Video Downloader</h1>
        <div class="subtitle">YouTube · Facebook · TikTok · Audio & Video</div>

        <div class="platform-selector">
            <div class="platform-btn active" data-platform="youtube">▶️ YouTube</div>
            <div class="platform-btn" data-platform="facebook">📘 Facebook</div>
            <div class="platform-btn" data-platform="tiktok">🎵 TikTok</div>
        </div>

        <div class="url-input-wrapper">
            <input type="text" id="videoUrl" class="url-input" placeholder="https://www.youtube.com/watch?v=...">
            <button class="fetch-btn" onclick="fetchVideo()">Get</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing video...</p>
        </div>

        <div class="result-box" id="resultBox">
            <div class="video-card">
                <img id="thumbnail" class="thumbnail" src="">
                <div class="video-title" id="videoTitle"></div>
            </div>
            <div class="section-title">📥 Download Options</div>
            <div class="quality-grid" id="qualityList"></div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <div class="powered">Powered by Kharal ❤️ By Love is taha</div>
    </div>

    <div class="bottom-info">⚡ Direct save to mobile storage | Supports all platforms</div>

    <script>
        let currentFormats = [];
        let currentPlatform = 'youtube';

        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPlatform = this.dataset.platform;
                
                const input = document.getElementById('videoUrl');
                if(currentPlatform === 'youtube') input.placeholder = 'https://www.youtube.com/watch?v=...';
                else if(currentPlatform === 'facebook') input.placeholder = 'https://www.facebook.com/.../videos/...';
                else input.placeholder = 'https://www.tiktok.com/@username/video/...';
                
                document.getElementById('resultBox').style.display = 'none';
                currentFormats = [];
            });
        });

        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if(!url) {
                showError('Please enter a video link');
                return;
            }

            showLoading(true);
            hideError();
            document.getElementById('resultBox').style.display = 'none';

            try {
                let data = null;
                
                // YouTube Download
                if(currentPlatform === 'youtube' || url.includes('youtube.com') || url.includes('youtu.be')) {
                    data = await fetchYouTube(url);
                }
                // Facebook Download
                else if(currentPlatform === 'facebook' || url.includes('facebook.com')) {
                    data = await fetchFacebook(url);
                }
                // TikTok Download
                else if(currentPlatform === 'tiktok' || url.includes('tiktok.com')) {
                    data = await fetchTikTok(url);
                }
                
                if(data && data.formats && data.formats.length > 0) {
                    currentFormats = data.formats;
                    displayVideoInfo(data);
                    showLoading(false);
                } else {
                    throw new Error('No download links found');
                }
                
            } catch(error) {
                showLoading(false);
                showError(error.message);
            }
        }

        // YouTube Download Function
        async function fetchYouTube(url) {
            try {
                // Extract video ID
                let videoId = '';
                if(url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                } else if(url.includes('watch?v=')) {
                    videoId = url.split('watch?v=')[1].split('&')[0];
                } else if(url.includes('shorts/')) {
                    videoId = url.split('shorts/')[1].split('?')[0];
                }
                
                if(!videoId) {
                    throw new Error('Invalid YouTube URL');
                }
                
                // Using multiple APIs for YouTube
                const apiUrls = [
                    `https://api.cobalt.tools/api/json`,
                    `https://ytdlapi.com/api/download?url=${encodeURIComponent(url)}`
                ];
                
                // Try first API
                try {
                    const response = await fetch('https://api.cobalt.tools/api/json', {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ url: url })
                    });
                    
                    if(response.ok) {
                        const data = await response.json();
                        if(data.url) {
                            return {
                                title: 'YouTube Video',
                                thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
                                formats: [
                                    { quality: '🎬 Video (MP4)', url: data.url, type: 'video', size: '~10MB' },
                                    { quality: '🎵 Audio Only (MP3)', url: data.url, type: 'audio', size: '~4MB' }
                                ]
                            };
                        }
                    }
                } catch(e) {}
                
                // Fallback: Direct download link generator
                const downloadUrl = `https://y2mate.is/en/yt2mp4/?url=${encodeURIComponent(url)}`;
                
                return {
                    title: 'YouTube Video',
                    thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
                    formats: [
                        { quality: '🎬 720p Video', url: downloadUrl, type: 'video', size: '~10MB' },
                        { quality: '🎬 480p Video', url: downloadUrl, type: 'video', size: '~6MB' },
                        { quality: '🎵 Audio (MP3)', url: `https://y2mate.is/en/yt2mp3/?url=${encodeURIComponent(url)}`, type: 'audio', size: '~4MB' }
                    ]
                };
                
            } catch(error) {
                throw new Error('YouTube download failed. Try another video.');
            }
        }

        // Facebook Download Function
        async function fetchFacebook(url) {
            try {
                const response = await fetch(`https://getvideo.cc/api/video-info?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                const formats = [];
                if(data.hd_url) {
                    formats.push({ quality: '🎬 HD Video (1080p)', url: data.hd_url, type: 'video', size: '~15MB' });
                }
                if(data.sd_url) {
                    formats.push({ quality: '🎬 SD Video (480p)', url: data.sd_url, type: 'video', size: '~6MB' });
                }
                
                return {
                    title: data.title || 'Facebook Video',
                    thumbnail: data.thumbnail || 'https://via.placeholder.com/400x225',
                    formats: formats
                };
                
            } catch(error) {
                throw new Error('Facebook download failed. Make sure the video is public.');
            }
        }

        // TikTok Download Function - Working (No Watermark)
        async function fetchTikTok(url) {
            try {
                const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.code === 0 && data.data) {
                    const formats = [];
                    
                    if(data.data.play) {
                        formats.push({ quality: '🎬 No Watermark (HD)', url: data.data.play, type: 'video', size: '~8MB' });
                    }
                    if(data.data.wmplay) {
                        formats.push({ quality: '🎬 With Watermark', url: data.data.wmplay, type: 'video', size: '~8MB' });
                    }
                    if(data.data.music) {
                        formats.push({ quality: '🎵 Audio Only (MP3)', url: data.data.music, type: 'audio', size: '~3MB' });
                    }
                    
                    return {
                        title: data.data.title || 'TikTok Video',
                        thumbnail: data.data.cover || 'https://via.placeholder.com/400x225',
                        formats: formats
                    };
                }
                
                throw new Error('No video found');
                
            } catch(error) {
                throw new Error('TikTok download failed. Try a different video.');
            }
        }

        function displayVideoInfo(data) {
            document.getElementById('videoTitle').textContent = data.title;
            document.getElementById('thumbnail').src = data.thumbnail;
            
            const qualityList = document.getElementById('qualityList');
            qualityList.innerHTML = '';
            
            currentFormats.forEach((format, index) => {
                const div = document.createElement('div');
                div.className = 'quality-option';
                div.innerHTML = `
                    <div class="quality-info">
                        <span>${format.type === 'video' ? '🎬' : '🎵'}</span>
                        <div>
                            <div class="quality-name">${format.quality}</div>
                            <div class="quality-size">${format.size || '~5MB'}</div>
                        </div>
                    </div>
                    <button class="download-item-btn" onclick="downloadFormat(${index})">Download</button>
                `;
                qualityList.appendChild(div);
            });
            
            document.getElementById('resultBox').style.display = 'block';
        }

        function downloadFormat(index) {
            const format = currentFormats[index];
            
            if(!format || !format.url) {
                showError('Download link not available');
                return;
            }
            
            // For YouTube, open in new tab
            if(format.url.includes('y2mate')) {
                window.open(format.url, '_blank');
                showSuccess('Opening download page... Click download button there');
            } else {
                const link = document.createElement('a');
                link.href = format.url;
                link.download = `video_${Date.now()}.${format.type === 'video' ? 'mp4' : 'mp3'}`;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showSuccess(`Downloading ${format.type.toUpperCase()}... Check your downloads folder`);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.querySelector('.fetch-btn').disabled = show;
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
