<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KHARAL-MD - Video & Audio Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .top-bar {
            background: #ffffff;
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff6b6b;
        }
        
        .brand-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .whatsapp-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #25D366;
            padding: 8px 14px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }
        
        .main-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }
        
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 6px;
            color: #1a1a2e;
        }
        
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .platform-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .platform-btn {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            color: #333;
        }
        
        .platform-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-color: transparent;
            color: white;
        }
        
        .url-input-wrapper {
            background: #f5f5f5;
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .url-input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            background: transparent;
            font-size: 14px;
            outline: none;
        }
        
        .fetch-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 60px;
            padding: 0 24px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        
        .fetch-btn:disabled {
            opacity: 0.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-box {
            display: none;
            margin-top: 24px;
        }
        
        .video-card {
            background: #f8f9fa;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        
        .video-title {
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            word-break: break-word;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        
        .quality-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .quality-option {
            background: #f8f9fa;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }
        
        .quality-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quality-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        
        .quality-size {
            font-size: 11px;
            color: #999;
        }
        
        .download-item-btn {
            background: #25D366;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        
        .error-msg, .success-msg {
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        
        .error-msg {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .powered {
            text-align: center;
            font-size: 11px;
            margin-top: 20px;
            color: #999;
        }
        
        .bottom-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-area">
            <img src="https://i.postimg.cc/NfJxTRWy/1775276938074-1.jpg" class="logo-img" onerror="this.src='https://via.placeholder.com/42'">
            <span class="brand-text">KHARAL-MD</span>
        </div>
        <a href="https://wa.me/923292359957" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
    </div>

    <div class="main-card">
        <h1>📥 Video Downloader</h1>
        <div class="subtitle">YouTube · Facebook · TikTok · Audio & Video</div>

        <div class="platform-selector">
            <div class="platform-btn active" data-platform="youtube">▶️ YouTube</div>
            <div class="platform-btn" data-platform="facebook">📘 Facebook</div>
            <div class="platform-btn" data-platform="tiktok">🎵 TikTok</div>
        </div>

        <div class="url-input-wrapper">
            <input type="text" id="videoUrl" class="url-input" placeholder="Paste video link here...">
            <button class="fetch-btn" onclick="fetchVideo()">Get</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching video...</p>
        </div>

        <div class="result-box" id="resultBox">
            <div class="video-card">
                <img id="thumbnail" class="thumbnail" src="">
                <div class="video-title" id="videoTitle"></div>
            </div>
            <div class="section-title">📥 Download Options</div>
            <div class="quality-grid" id="qualityList"></div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <div class="powered">Powered by Kharal ❤️ By Love is taha</div>
    </div>

    <div class="bottom-info">⚡ Direct download | Save to mobile storage</div>

    <script>
        let currentFormats = [];
        let currentPlatform = 'youtube';

        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPlatform = this.dataset.platform;
                document.getElementById('resultBox').style.display = 'none';
                currentFormats = [];
            });
        });

        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if(!url) {
                showError('Please enter a video link');
                return;
            }

            showLoading(true);
            hideError();
            document.getElementById('resultBox').style.display = 'none';

            try {
                let data = null;
                
                if(currentPlatform === 'youtube' || url.includes('youtube.com') || url.includes('youtu.be')) {
                    data = await fetchYouTube(url);
                }
                else if(currentPlatform === 'facebook' || url.includes('facebook.com')) {
                    data = await fetchFacebook(url);
                }
                else if(currentPlatform === 'tiktok' || url.includes('tiktok.com')) {
                    data = await fetchTikTok(url);
                }
                
                if(data && data.formats && data.formats.length > 0) {
                    currentFormats = data.formats;
                    displayVideoInfo(data);
                    showLoading(false);
                } else {
                    throw new Error('No download links found');
                }
                
            } catch(error) {
                showLoading(false);
                showError(error.message);
            }
        }

        // YouTube Direct Download
        async function fetchYouTube(url) {
            try {
                // Extract video ID
                let videoId = '';
                if(url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                } else if(url.includes('watch?v=')) {
                    videoId = url.split('watch?v=')[1].split('&')[0];
                } else if(url.includes('shorts/')) {
                    videoId = url.split('shorts/')[1].split('?')[0];
                }
                
                // Using yt5s.com API for direct download
                const apiUrl = `https://yt5s.com/api/ajaxSearch`;
                
                const formData = new FormData();
                formData.append('q', url);
                formData.append('vt', 'mp4');
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if(data && data.links) {
                    return {
                        title: data.title || 'YouTube Video',
                        thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
                        formats: [
                            { quality: '🎬 1080p Video', url: data.links.mp4['1080'] || data.links.mp4['720'], type: 'video', size: '~15MB' },
                            { quality: '🎬 720p Video', url: data.links.mp4['720'] || data.links.mp4['360'], type: 'video', size: '~10MB' },
                            { quality: '🎵 Audio (MP3)', url: data.links.mp3, type: 'audio', size: '~4MB' }
                        ]
                    };
                }
                
                throw new Error('No download links');
                
            } catch(error) {
                // Fallback: Use alternative API
                try {
                    const altApi = `https://api.ryzendesu.vip/api/download/ytdl?url=${encodeURIComponent(url)}`;
                    const response = await fetch(altApi);
                    const data = await response.json();
                    
                    if(data.result && data.result.video) {
                        return {
                            title: data.result.title || 'YouTube Video',
                            thumbnail: data.result.thumbnail,
                            formats: [
                                { quality: '🎬 Video', url: data.result.video['720p'] || data.result.video['480p'], type: 'video', size: '~10MB' },
                                { quality: '🎵 Audio', url: data.result.audio, type: 'audio', size: '~4MB' }
                            ]
                        };
                    }
                } catch(e) {}
                
                throw new Error('YouTube: Please try another video');
            }
        }

        // Facebook Direct Download
        async function fetchFacebook(url) {
            try {
                const response = await fetch(`https://getvideo.cc/api/video-info?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                const formats = [];
                if(data.hd_url) {
                    formats.push({ quality: '🎬 HD Video (1080p)', url: data.hd_url, type: 'video', size: '~15MB' });
                }
                if(data.sd_url) {
                    formats.push({ quality: '🎬 SD Video (480p)', url: data.sd_url, type: 'video', size: '~6MB' });
                }
                
                return {
                    title: data.title || 'Facebook Video',
                    thumbnail: data.thumbnail || 'https://via.placeholder.com/400x225',
                    formats: formats
                };
                
            } catch(error) {
                throw new Error('Facebook: Make sure video is public');
            }
        }

        // TikTok Direct Download (100% Working)
        async function fetchTikTok(url) {
            try {
                const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.code === 0 && data.data) {
                    const formats = [];
                    
                    if(data.data.play) {
                        formats.push({ quality: '🎬 No Watermark (HD)', url: data.data.play, type: 'video', size: '~8MB' });
                    }
                    if(data.data.wmplay) {
                        formats.push({ quality: '🎬 With Watermark', url: data.data.wmplay, type: 'video', size: '~8MB' });
                    }
                    if(data.data.music) {
                        formats.push({ quality: '🎵 Audio Only (MP3)', url: data.data.music, type: 'audio', size: '~3MB' });
                    }
                    
                    return {
                        title: data.data.title || 'TikTok Video',
                        thumbnail: data.data.cover || 'https://via.placeholder.com/400x225',
                        formats: formats
                    };
                }
                
                throw new Error('No video found');
                
            } catch(error) {
                throw new Error('TikTok: Try a different video');
            }
        }

        function displayVideoInfo(data) {
            document.getElementById('videoTitle').textContent = data.title;
            document.getElementById('thumbnail').src = data.thumbnail;
            
            const qualityList = document.getElementById('qualityList');
            qualityList.innerHTML = '';
            
            currentFormats.forEach((format, index) => {
                if(format.url && format.url !== '#') {
                    const div = document.createElement('div');
                    div.className = 'quality-option';
                    div.innerHTML = `
                        <div class="quality-info">
                            <span>${format.type === 'video' ? '🎬' : '🎵'}</span>
                            <div>
                                <div class="quality-name">${format.quality}</div>
                                <div class="quality-size">${format.size || '~5MB'}</div>
                            </div>
                        </div>
                        <button class="download-item-btn" onclick="downloadFormat(${index})">Download</button>
                    `;
                    qualityList.appendChild(div);
                }
            });
            
            document.getElementById('resultBox').style.display = 'block';
        }

        function downloadFormat(index) {
            const format = currentFormats[index];
            
            if(!format || !format.url) {
                showError('Download link not available');
                return;
            }
            
            // Direct download without redirect
            const link = document.createElement('a');
            link.href = format.url;
            link.download = `kharal_${Date.now()}.${format.type === 'video' ? 'mp4' : 'mp3'}`;
            link.setAttribute('download', '');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showSuccess(`✅ Download started! Video saving to your device...`);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.querySelector('.fetch-btn').disabled = show;
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
